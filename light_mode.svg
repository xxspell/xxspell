    <tspan x="15" y="310">в Җв Җв ҖвЈ°в ҸвЈ”вў вЎҝвўівЈ„в Җв Җв Ҳв үв ҷв ӣв Ӣв Ғв Җв Җв Җв ҖвЎјв Җв ҖвЈјвЎҹв ҖвўҖв ҖвЈ§в ёвЎҮ</tspan>
    <tspan x="15" y="330">в ҖвЈ°в һвЎҝвЈёвЈҝв »вЈ·в Җв ҷв ·вЈ„вЎҖв Җв Җв Җв Җв Җв Җв ҖвЈ в һв ҒвЈ вЈҫвўҸвў°вЎҝвў·вЈ…вўёвў </tspan>
