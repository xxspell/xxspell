    <tspan x="15" y="130">в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЈ вЈӨвЎҖв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</tspan>
    <tspan x="15" y="150">в Җв Җв Җв Җв Җв Җв Җв Җв ҖвўҖвЈ вЈӨв Өв ӨвўӨвЈ„вЎҖв Җв Җвў°в ҝвў§вЈҝв „в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</tspan>
    <tspan x="15" y="170">в Җв Җв Җв Җв Җв Җв Җв ҖвЎҙв Ӣв Ғв Җв Җв ҖвўҖвЈ¬в Ҫв івЈӨвўһвЎҙв Ҡв Ғв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</tspan>
    <tspan x="15" y="190">в Җв Җв Җв Җв Җв Җв ҖвЎҫв Җв ҖвўҖвЎҖв Җв  в үвЈ вЈӨвЎ„в Җв ёвЈҮв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</tspan>
    <tspan x="15" y="210">в ҖвўҖвЈ¶вЈӨвЎҖв Җвў вЎ·в ӢвЈҒвЈҖвў°вЎҖв Җв ҳв “в Ҡв Ғв Җв Җв ҳвЈ§в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</tspan>
    <tspan x="15" y="230">в Җв ёвЈ§вЈҮвЎ©вЈҹвЎӣв Җв ёв Ҝв ҚвЎ»в ӣв үв үвўүвЈҪв  в Өв ӨвЎҖв ҳвЈ§в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</tspan>
    <tspan x="15" y="250">в Җв Җв Ҳв Җв Җв Җвўёв Җв Җв Ҳв Җвў§в Өв Өв –вўЎв Җв Җв ҖвЈ в „в Җв ёвЈ·вЈӨвЈ„вЈҖв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ</tspan>
